<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #f3f5f7;
      --surface: #fff;
      --fill: rgba(18, 28, 38, .055);
      --fill-hover: rgba(18, 28, 38, .085);
      --label: #19212a;
      --label-secondary: #68737e;
      --separator: rgba(18, 28, 38, .08);
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, .12);
      --success: #20865c;
      --success-soft: rgba(32, 134, 92, .12);
      --warning: #a96700;
      --warning-soft: rgba(255, 149, 0, .14);
      --danger: #c23b3b;
      --danger-soft: rgba(194, 59, 59, .12);
      --shadow:
        0 0 0 1px rgba(0, 0, 0, .05),
        0 1px 2px -1px rgba(0, 0, 0, .06),
        0 8px 24px -16px rgba(28, 39, 51, .2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #17191c;
        --surface: #26282c;
        --fill: rgba(255, 255, 255, .07);
        --fill-hover: rgba(255, 255, 255, .11);
        --label: #f4f5f7;
        --label-secondary: #a2a8b0;
        --separator: rgba(255, 255, 255, .09);
        --accent: #409cff;
        --accent-soft: rgba(64, 156, 255, .16);
        --success: #56c995;
        --success-soft: rgba(86, 201, 149, .14);
        --warning: #ffb64d;
        --warning-soft: rgba(255, 182, 77, .14);
        --danger: #ff7979;
        --danger-soft: rgba(255, 121, 121, .14);
        --shadow: 0 0 0 1px rgba(255, 255, 255, .08);
      }
    }

    * { box-sizing: border-box; }

    html {
      background: var(--canvas);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      width: 360px;
      min-height: 468px;
      margin: 0;
      padding: 16px;
      color: var(--label);
      background: var(--canvas);
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button { font: inherit; }

    .header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 7px 18px -11px var(--accent);
    }

    .logo svg { width: 21px; height: 21px; }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 680;
      letter-spacing: -.015em;
      text-wrap: balance;
    }

    .connection {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 14px;
      color: var(--label-secondary);
      background: var(--fill);
      font-size: 11.5px;
      font-weight: 570;
      white-space: nowrap;
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border: 1.5px solid currentColor;
      border-radius: 50%;
    }

    .connection.connected { color: var(--success); background: var(--success-soft); }
    .connection.connected .connection-dot { border: 0; background: currentColor; }
    .connection.disconnected { color: var(--danger); background: var(--danger-soft); }

    .section { margin-top: 16px; }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 8px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 12px;
      font-weight: 650;
      color: var(--label-secondary);
    }

    .section-heading span {
      color: var(--label-secondary);
      font-size: 10.5px;
      font-variant-numeric: tabular-nums;
    }

    .card {
      overflow: hidden;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 43px;
      margin: 0 14px;
    }

    .setting-row + .setting-row { border-top: .5px solid var(--separator); }

    .setting-name { color: var(--label-secondary); }

    .setting-value {
      min-width: 0;
      overflow: hidden;
      color: var(--label);
      font-weight: 580;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .setting-value.on { color: var(--success); }
    .setting-value.off { color: var(--danger); }

    .log-list { min-height: 64px; }

    .log-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 12px;
      min-height: 62px;
      margin: 0 14px;
      padding: 10px 0;
    }

    .log-item + .log-item { border-top: .5px solid var(--separator); }
    .log-copy { min-width: 0; }

    .log-title {
      overflow: hidden;
      font-size: 12.5px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-url {
      overflow: hidden;
      margin-top: 2px;
      color: var(--label-secondary);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-meta {
      margin-top: 3px;
      color: var(--label-secondary);
      font-size: 10.5px;
      font-variant-numeric: tabular-nums;
    }

    .log-status {
      align-self: start;
      min-height: 24px;
      padding: 4px 8px 0;
      border-radius: 8px;
      color: var(--label-secondary);
      background: var(--fill);
      font-size: 10.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .log-status.sent { color: var(--success); background: var(--success-soft); }
    .log-status.local { color: var(--warning); background: var(--warning-soft); }
    .log-status.failed { color: var(--danger); background: var(--danger-soft); }

    .empty {
      display: grid;
      place-items: center;
      min-height: 86px;
      padding: 16px;
      color: var(--label-secondary);
      text-align: center;
      text-wrap: pretty;
    }

    .actions {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 16px;
      border: 0;
      border-radius: 12px;
      color: var(--label);
      background: var(--surface);
      box-shadow: var(--shadow);
      font-weight: 620;
      cursor: pointer;
      transition-property: background-color, filter, scale;
      transition-duration: 150ms;
      transition-timing-function: ease-out;
    }

    .action.primary { color: #fff; background: var(--accent); }
    .action:hover { background: color-mix(in srgb, var(--surface) 92%, var(--accent)); }
    .action.primary:hover { filter: brightness(1.06); background: var(--accent); }
    .action:active { scale: .96; }
    .action:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }
    .action:disabled { opacity: .62; cursor: default; }
    .action svg { width: 16px; height: 16px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0ms !important; }
    }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3.5v10M6.8 9.7 12 14.9l5.2-5.2M6 20h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <div class="brand">
      <div class="brand-row">
        <h1>Hydra</h1>
        <div class="connection" id="connection" role="status" aria-live="polite">
          <span class="connection-dot" aria-hidden="true"></span>
          <span id="connectionText">Проверяем…</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="section" aria-labelledby="settingsTitle">
      <div class="section-heading"><h2 id="settingsTitle">Перехват</h2></div>
      <div class="card">
        <div class="setting-row"><span class="setting-name">Перехватывать автоматически</span><span class="setting-value" id="autoValue">—</span></div>
        <div class="setting-row"><span class="setting-name">Минимальный размер файла</span><span class="setting-value" id="sizeValue">—</span></div>
        <div class="setting-row"><span class="setting-name">Сайты</span><span class="setting-value" id="domainsValue">—</span></div>
        <div class="setting-row"><span class="setting-name">Типы файлов</span><span class="setting-value" id="typesValue">—</span></div>
      </div>
    </section>

    <section class="section" aria-labelledby="logTitle">
      <div class="section-heading">
        <h2 id="logTitle">Последние передачи</h2>
        <span id="logCount"></span>
      </div>
      <div class="card log-list" id="logList">
        <div class="empty">Здесь появятся ссылки, которые расширение передало в Hydra.</div>
      </div>
    </section>

    <div class="actions">
      <button class="action primary" id="openApp" type="button">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M10 2.5v8M6.5 7.5 10 11l3.5-3.5M5 15.5h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Открыть Hydra</span>
      </button>
      <button class="action" id="openSettings" type="button">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" stroke="currentColor" stroke-width="1.5"/><path d="M16 10a6 6 0 0 0-.1-1l1.5-1.2-1.5-2.6-1.8.7a7 7 0 0 0-1.8-1L12 3h-4l-.3 1.9a7 7 0 0 0-1.8 1l-1.8-.7-1.5 2.6L4.1 9a6 6 0 0 0 0 2l-1.5 1.2 1.5 2.6 1.8-.7a7 7 0 0 0 1.8 1L8 17h4l.3-1.9a7 7 0 0 0 1.8-1l1.8.7 1.5-2.6-1.5-1.2c.1-.3.1-.7.1-1Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        <span>Настройки расширения</span>
      </button>
    </div>
  </main>

  <script src="native.js"></script>
  <script src="rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
