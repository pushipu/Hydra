<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --accent: AccentColor;
      --label: #1d1d1f; --label2: #86868b;
      --sep: rgba(0,0,0,.08); --fill: rgba(0,0,0,.05); --bg: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --label: #f5f5f7; --label2: #98989d; --sep: rgba(255,255,255,.1); --fill: rgba(255,255,255,.08); --bg: #232325; }
    }
    * { box-sizing: border-box; }
    body { font: 13px -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased;
           width: 268px; margin: 0; color: var(--label); background: var(--bg); }
    .hdr { display: flex; align-items: center; gap: 8px; padding: 11px 13px; border-bottom: .5px solid var(--sep); }
    .logo { width: 16px; height: 16px; border-radius: 4px; background: var(--accent, #0A84FF); flex: 0 0 auto;
            display: flex; align-items: center; justify-content: center; }
    .name { font-weight: 600; font-size: 13px; }
    .pill { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--label2); }
    .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .pill.on { color: #30A46C; } .pill.on .dot { background: #30D158; }
    .pill.off .dot { border: 1.5px solid var(--label2); }
    .item { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-bottom: .5px solid var(--sep); }
    .badge { width: 26px; height: 26px; border-radius: 6px; background: var(--fill); display: flex; align-items: center;
             justify-content: center; font-size: 8px; font-weight: 600; color: var(--label2); flex: 0 0 auto; }
    .it-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .it-sub { font-size: 11px; color: var(--label2); display: flex; align-items: center; gap: 5px; margin-top: 1px;
              font-variant-numeric: tabular-nums; }
    .it-sub .d { width: 5px; height: 5px; border-radius: 50%; background: var(--accent, #0A84FF); flex: 0 0 auto; }
    .empty { padding: 22px 13px; text-align: center; color: var(--label2); font-size: 12.5px; }
    .warn { margin: 12px 13px; background: color-mix(in srgb, #FF9500 14%, transparent); border-radius: 10px; padding: 11px 12px; }
    .warn .t { font-size: 12.5px; font-weight: 600; color: #995C00; }
    .warn .b { font-size: 11.5px; color: var(--label2); margin-top: 3px; line-height: 1.45; }
    .ftr { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px;
           border-top: .5px solid var(--sep); font-size: 12px; color: var(--label2); }
    a { color: var(--accent, #0A84FF); cursor: pointer; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="hdr">
    <span class="logo" id="logo"><svg viewBox="0 0 11 11" width="11" height="11" aria-hidden="true">
      <path d="M5.5 1.4 V6.4 M2.8 4.7 L5.5 7.4 L8.2 4.7" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2.4 9.4 H8.6" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
    </svg></span>
    <span class="name">Hydra</span>
    <span class="pill" id="pill"><span class="dot"></span>Проверка…</span>
  </div>
  <div id="body"></div>
  <div class="ftr"><span id="ai"></span><a id="opts">Настройки…</a></div>
  <script src="popup.js"></script>
</body>
</html>
